<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="12"/>
  
  <!-- Shield shape with security icon -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a96c8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main shield -->
  <path d="M 50 15 L 30 30 L 30 55 Q 30 75 50 85 Q 70 75 70 55 L 70 30 Z" 
        fill="url(#shieldGradient)" 
        stroke="#00c8ff" 
        stroke-width="1.5"
        stroke-linejoin="round"/>
  
  <!-- Lock icon inside shield -->
  <rect x="38" y="42" width="24" height="18" rx="2" 
        fill="none" 
        stroke="#0a0a0a" 
        stroke-width="2"/>
  
  <path d="M 42 42 Q 42 35 50 35 Q 58 35 58 42" 
        fill="none" 
        stroke="#0a0a0a" 
        stroke-width="2" 
        stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="50" cy="52" r="2" fill="#0a0a0a"/>
  <line x1="50" y1="54" x2="50" y2="57" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
</svg>